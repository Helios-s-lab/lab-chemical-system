[build]
  command = "cd client && npm run build"
  publish = "client/dist"

[build.environment]
  IS_VERCEL = "1"

[functions]
  directory = "netlify/functions"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
