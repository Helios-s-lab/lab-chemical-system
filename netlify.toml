[build]
  base = "client"
  command = "npm run build"
  publish = "dist"

[build.environment]
  IS_VERCEL = "1"    # 让后端不启动监听

[functions]
  directory = "netlify/functions"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200